{% extends "admin/change_list.html" %}

{% block content_title %}
  {{ block.super }}
  {% if booking_summary %}
    <div style="display:grid;grid-template-columns:repeat(3,minmax(180px,1fr));gap:12px;margin-top:16px;margin-bottom:8px;">
      <div style="background:#f4f6f9;border:1px solid #dce3ea;border-radius:8px;padding:12px 14px;">
        <div style="font-size:12px;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;">Today</div>
        <div style="font-size:24px;font-weight:700;line-height:1.2;color:#111827;">{{ booking_summary.today }}</div>
      </div>
      <div style="background:#f4f6f9;border:1px solid #dce3ea;border-radius:8px;padding:12px 14px;">
        <div style="font-size:12px;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;">This Month</div>
        <div style="font-size:24px;font-weight:700;line-height:1.2;color:#111827;">{{ booking_summary.this_month }}</div>
      </div>
      <div style="background:#f4f6f9;border:1px solid #dce3ea;border-radius:8px;padding:12px 14px;">
        <div style="font-size:12px;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;">Total</div>
        <div style="font-size:24px;font-weight:700;line-height:1.2;color:#111827;">{{ booking_summary.total }}</div>
      </div>
    </div>
  {% endif %}
{% endblock %}
